name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Get pybind11 CMake dir
        id: pybind11
        run: |
          PYBIND11_DIR=$(python -c "import pybind11; print(pybind11.get_cmake_dir())")
          echo "cmake_dir=$PYBIND11_DIR" >> $GITHUB_OUTPUT
          echo "Found pybind11 at: $PYBIND11_DIR"

      - name: Build C++ module
        run: |
          cmake -S . -B build \
            -DPYBIND11_FINDPYTHON=ON \
            -Dpybind11_DIR=${{ steps.pybind11.outputs.cmake_dir }}
          cmake --build build --config Release

      - name: Copy C++ module
        run: |
          find build -name "audio_core_cpp*" -type f
          find build -name "audio_core_cpp*.so" -exec cp {} . \;
          ls -la audio_core_cpp*

      - name: Verify module
        run: python -c "import audio_core_cpp; print('Module loaded OK')"

      - name: Run tests
        run: pytest tests/ -v